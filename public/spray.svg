<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <filter id="spray" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.62" numOctaves="2" seed="11" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.992
                                                      0 0 0 0 0.212
                                                      0 0 0 0 0.573
                                                      0 0 0 22 -10"/>
    </filter>
    <radialGradient id="fade" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="m"><rect width="500" height="500" fill="url(#fade)"/></mask>
  </defs>
  <rect width="500" height="500" filter="url(#spray)" mask="url(#m)"/>
</svg>
